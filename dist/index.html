async function prefetchApplicationsMessages(apps) {
  for (var i = 0; i < apps.length; i++) {
    var a = apps[i];
    if (state.messagesByApp[a.id]) continue; // already cached
    try {
      var msgs = await invoke('fetch_messages', { applicationId: a.id, serverUrl: serverUrlArg() });
      state.messagesByApp[a.id] = msgs;
      // Repaint the row so its preview reflects the just-fetched last message.
      var card = document.getElementById('app-card-'+a.id);
      if (card && state.applications) repaintApplicationRowPreview(a, card);
    } catch (e) { /* ignore */ }
  }
}

function repaintApplicationRowPreview(a, card) {
  var preview = lastMessagePreview(a.id, a.message);
  // Find the meta div (1st child with .meta class) and update text.
  var meta = card.querySelector('.meta');
  if (meta) {
    var sum = a.summary || {};
    meta.innerHTML = preview.text
      ? (preview.mine?'<span style="color:var(--text2);">You: </span>':'')+escapeHtml(preview.text)
      : escapeHtml((a.message||'').slice(0,80) || sumLineMeta(sum));
  }
}

function lastMessagePreview(applicationId, fallbackText) {
  var msgs = state.messagesByApp[applicationId];
  if (msgs && msgs.length) {
    var last = msgs[msgs.length-1];
    var myId = state.myIdentity ? state.myIdentity.user_id : '';
    return {text: (last.plaintext||'').slice(0,80), time: last.sent_at, mine: last.from_user_id === myId};
  }
  return {text: '', time: '', mine: false};
}

function sumLineMeta(sum) {
  var parts = [];
  if (sum.nationality) parts.push(sum.nationality);
  if (sum.total_sea_time_months) parts.push(sum.total_sea_time_months+' mo at sea');
  if (sum.salary_expectation) parts.push('expects '+(sum.salary_currency||'USD')+' '+sum.salary_expectation);
  if (sum.available_from) parts.push('avail '+sum.available_from);
  return parts.join(' · ');
}

function formatChatRowTime(iso) {
  if (!iso) return '';
  var d = new Date(iso);
  if (isNaN(d)) return '';
  var today = new Date();
  if (d.toDateString() === today.toDateString()) return iso.slice(11,16);
  var yest = new Date(); yest.setDate(yest.getDate()-1);
  if (d.toDateString() === yest.toDateString()) return 'Yesterday';
  return d.toLocaleDateString(undefined, {day:'numeric', month:'short'});
}

function stopApplicationPoll(host) {
  if (!host || !host.dataset.pollId) return;
  clearInterval(parseInt(host.dataset.pollId, 10));
  host.dataset.pollId = '';
}

function setApplicationExpanded(applicationId, expanded) {
  var details = document.getElementById('appdetails-'+applicationId);
  var host = document.getElementById('appthread-'+applicationId);
  var card = document.getElementById('app-card-'+applicationId);
  var caret = document.getElementById('app-caret-'+applicationId);
  if (details) details.style.display = expanded ? 'block' : 'none';
  if (host) host.style.display = expanded ? 'block' : 'none';
  if (card) card.classList.toggle('app-expanded', !!expanded);
  if (caret) caret.textContent = expanded ? 'v' : '>';
}

function closeApplicationChat(applicationId) {
  var host = document.getElementById('appthread-'+applicationId);
  if (host) {
    stopApplicationPoll(host);
    host.dataset.loaded = '';
  }
  setApplicationExpanded(applicationId, false);
  if (state.focusedApplicationId === applicationId) {
    state.focusedApplicationId = null;
    applyApplicationFocus();
  }
}

function closeOtherApplicationChats(applicationId) {
  document.querySelectorAll('[id^="appthread-"]').forEach(function(host){
    if (host.id === 'appthread-'+applicationId) return;
    stopApplicationPoll(host);
    host.dataset.loaded = '';
    setApplicationExpanded(host.id.replace('appthread-', ''), false);
  });
}

function applyApplicationFocus() {
  var focusId = state.focusedApplicationId;
  var focusCard = focusId ? document.getElementById('app-card-'+focusId) : null;
  var focusHost = focusId ? document.getElementById('appthread-'+focusId) : null;
  if (focusId && (!focusCard || !focusHost || focusHost.style.display === 'none')) {
    state.focusedApplicationId = null;
    focusId = null;
  }
  document.querySelectorAll('[id^="app-card-"]').forEach(function(card){
    var id = card.id.replace('app-card-', '');
    card.style.display = 'block';
    card.classList.toggle('app-expanded', !!focusId && id === focusId);
  });
}

// Toggle inline E2E thread under an application card. Crewing-side mirror
// of seafarer's toggleVacancyThread — same UX, opposite participant.
async function toggleApplicationChat(applicationId, seafarerUserId, forceOpen) {
  var host = document.getElementById('appthread-'+applicationId);
  if (!host) return;
  if (host.style.display !== 'none' && !forceOpen) {
    closeApplicationChat(applicationId);
    return;
  }
  closeOtherApplicationChats(applicationId);
  state.focusedApplicationId = applicationId;
  setApplicationExpanded(applicationId, true);
  applyApplicationFocus();
  host.innerHTML = '<div class="chat-empty">Loading…</div>';
  // Register pubkey in background — don't await, no need to block UI on it.
  registerMessagingPubkey().catch(function(){});

  // Cache-first: render any previously-loaded messages instantly while we
  // refresh in the background.
  var cachedMsgs = state.messagesByApp[applicationId];
  var msgs = cachedMsgs || [];
  var atts = state.attachmentsByApp[applicationId] || [];
  if (!cachedMsgs) {
    try { msgs = await invoke('fetch_messages', { applicationId: applicationId, serverUrl: serverUrlArg() }); }
    catch(e){
      host.innerHTML = '<div class="chat-empty" style="color:var(--err);">Failed to load: '+e+'</div>';
      return;
    }
    state.messagesByApp[applicationId] = msgs;
    try {
      atts = await invoke('fetch_attachments_for_application', { applicationId: applicationId, serverUrl: serverUrlArg() });
      state.attachmentsByApp[applicationId] = atts || [];
    } catch(e) {
      atts = [];
    }
  } else {
    // Background refresh (no flicker — soft refresh hits the existing DOM later).
    setTimeout(function(){ refreshApplicationChat(applicationId, seafarerUserId, true); }, 0);
  }
  var msgsHtml = '<div id="app-msgs-'+applicationId+'" class="chat-pane">'
              + renderApplicationMessages(msgs)
              + renderApplicationAttachmentFallbacks(applicationId, atts, msgs)
              + '</div>';
  msgsHtml += '<div class="chat-composer">';
  msgsHtml += '<textarea id="app-compose-'+applicationId+'" rows="1" placeholder="Type a message" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendApplicationReply(\''+escapeAttr(applicationId)+'\',\''+escapeAttr(seafarerUserId||'')+'\');}"></textarea>';
  msgsHtml += '<button class="btn-send" onclick="sendApplicationReply(\''+escapeAttr(applicationId)+'\',\''+escapeAttr(seafarerUserId||'')+'\')" title="Send">▶</button>';
  msgsHtml += '</div>';
  msgsHtml += '<div class="chat-status">'
           +    '<span id="app-status-'+applicationId+'">🔒 End-to-end encrypted</span>'
           +    '<span style="display:flex;gap:6px;align-items:center;">'
           +      '<button class="ghost" style="padding:3px 10px;font-size:11px;" onclick="closeApplicationChat(\''+escapeAttr(applicationId)+'\')">Back to candidates</button>'
           +      '<button class="ghost" style="padding:3px 10px;font-size:11px;" onclick="requestDocs(\''+escapeAttr(applicationId)+'\',\''+escapeAttr(seafarerUserId||'')+'\')">📄 Request documents</button>'
           +    '</span>'
           +  '</div>';
  host.innerHTML = msgsHtml;
  host.dataset.loaded = '1';
  host.dataset.seafarerUserId = seafarerUserId || '';
  // Resolve and cache counterpart from existing messages so sending doesn't
  // need to fetch_messages first.
  var myId = state.myIdentity ? state.myIdentity.user_id : '';
  for (var i = 0; i < msgs.length; i++) {
    var mm = msgs[i];
    var c = mm.from_user_id !== myId ? mm.from_user_id : mm.to_user_id;
    if (c && c !== myId) { host.dataset.counterpartId = c; break; }
  }
  if (!host.dataset.counterpartId && seafarerUserId) {
    host.dataset.counterpartId = seafarerUserId;
  }

  var box = document.getElementById('app-msgs-'+applicationId);
  if (box) {
    box.dataset.msgCount = String(msgs.length + (atts || []).length);
    // Two RAFs — first lets layout commit, second pins to bottom after
    // bubbles paint. WebKit's scrollHeight is 0 in the same tick as
    // innerHTML assignment for tall content.
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        var b = document.getElementById('app-msgs-'+applicationId);
        if (b) b.scrollTop = b.scrollHeight;
      });
    });
  }

  // Auto-poll for new messages while the panel is open. Stops when the
  // panel is collapsed, while the textarea is focused/has draft, or when
  // another vacancy is opened. fetch_messages on the Rust side does per-
  // message HTTP lookups; polling during typing freezes input.
  if (host.dataset.pollId) clearInterval(parseInt(host.dataset.pollId, 10));
  var pollId = setInterval(function(){
    var h = document.getElementById('appthread-'+applicationId);
    if (!h || h.dataset.loaded !== '1' || h.style.display === 'none') {
      clearInterval(pollId);
      if (h) h.dataset.pollId = '';
      return;
    }
    var ta = document.getElementById('app-compose-'+applicationId);
    if (ta && (document.activeElement === ta || (ta.value||'').length > 0)) return;
    refreshApplicationChat(applicationId, seafarerUserId, /*silent=*/true);
  }, 5000);
  host.dataset.pollId = String(pollId);
}

function renderApplicationMessages(msgs) {
    if (!msgs.length) {
        return '<div class="chat-empty">No messages yet. Send the first reply to start the conversation.</div>';
    }
  var myId = state.myIdentity ? state.myIdentity.user_id : '';
  var html = '';
  var lastDay = '';
  msgs.forEach(function(m){
    var dt = m.sent_at || '';
    var day = dt.slice(0,10);
    if (day && day !== lastDay) {
      html += '<div class="chat-day-sep"><span>'+escapeHtml(formatDayLabel(day))+'</span></div>';
      lastDay = day;
    }
    html += renderMessageBubble(m, m.from_user_id === myId);
  });
  return html;
}

function attachmentIdsFromMessages(msgs) {
  var ids = {};
  (msgs || []).forEach(function(m){
    var raw = m.plaintext || '';
    var json = '';
    if (raw.indexOf('[skipi:file_attached]') === 0) {
      json = raw.replace('[skipi:file_attached]','').trim();
    } else if (raw.indexOf('[skipi:doc_bundle]') === 0) {
      json = raw.replace('[skipi:doc_bundle]','').trim();
    }
    if (!json) return;
    try {
      var parsed = JSON.parse(json);
      if (parsed && parsed.id) ids[parsed.id] = true;
    } catch(e){}
  });
  return ids;
}

function latestAttachmentFromSender(applicationId, senderUserId) {
  var atts = state.attachmentsByApp[applicationId] || [];
  var filtered = atts.filter(function(a){
    return a && a.id && (!senderUserId || a.from_user_id === senderUserId);
  });
  if (!filtered.length) return null;
  var bundles = filtered.filter(function(a){
    var name = String(a.original_filename || '').toLowerCase();
    var mime = String(a.mime_type || '').toLowerCase();
    return name.indexOf('documents-bundle') !== -1
      || name.indexOf('document') !== -1 && name.endsWith('.zip')
      || mime.indexOf('zip') !== -1 && name.indexOf('package') === -1;
  });
  if (bundles.length) filtered = bundles;
  filtered.sort(function(a,b){
    return String(b.sent_at||'').localeCompare(String(a.sent_at||''));
  });
  return filtered[0];
}

async function openLatestAttachmentFromSender(applicationId, senderUserId) {
  var att = latestAttachmentFromSender(applicationId, senderUserId);
  if (!att) {
    try {
      var fresh = await invoke('fetch_attachments_for_application', { applicationId: applicationId, serverUrl: serverUrlArg() });
      state.attachmentsByApp[applicationId] = fresh || [];
      att = latestAttachmentFromSender(applicationId, senderUserId);
    } catch(e) {
      showToast('Could not refresh attachments: '+e, 'error');
      return;
    }
  }
  if (!att) {
    showToast('No received attachment found for this document response.', 'warn');
    return;
  }
  var myId = state.myIdentity ? state.myIdentity.user_id : '';
  var counterpart = (myId && myId === att.from_user_id) ? att.to_user_id : att.from_user_id;
  await openAttachmentInApp(applicationId, att, counterpart || senderUserId || '');
}

function renderApplicationAttachmentFallbacks(applicationId, atts, msgs) {
  var linked = attachmentIdsFromMessages(msgs);
  var missing = (atts || []).filter(function(a){ return a && a.id && !linked[a.id]; });
  if (!missing.length) return '';
  var myId = state.myIdentity ? state.myIdentity.user_id : '';
  var html = '<div class="chat-day-sep"><span>Encrypted attachments</span></div>';
  missing.forEach(function(att){
    var sizeKb = att.size_bytes ? Math.round(att.size_bytes/1024)+' KB' : '';
    var fname = att.original_filename || 'file';
    var counterpart = (myId && myId === att.from_user_id) ? att.to_user_id : att.from_user_id;
    var isZip = String(att.mime_type||'').indexOf('zip') !== -1 || /\.zip$/i.test(fname);
    html += '<div class="msg other">'
         +    '<div class="msg-bubble" style="border:1px solid var(--ok);max-width:340px;">'
         +      '<div style="display:flex;align-items:center;gap:8px;">'

         +        '<div style="flex:1;min-width:0;">'
         +          '<div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(fname)+'</div>'
         +          '<div style="font-size:11px;opacity:0.7;">'+escapeHtml(sizeKb)+(att.mime_type?' · '+escapeHtml(att.mime_type):'')+'</div>'
         +        '</div>'
         +      '</div>'
         +      '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;">'
         +        (isZip ? '<button onclick="openDocumentsBundle(\''+escapeAttr(applicationId)+'\',\''+escapeAttr(att.id)+'\',\''+escapeAttr(counterpart||'')+'\',\''+escapeAttr(fname)+'\')" style="padding:5px 10px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">📂 Open documents</button>' : '')
         +        '<button onclick="openAttachmentInApp(\''+escapeAttr(applicationId)+'\',{id:\''+escapeAttr(att.id)+'\',original_filename:\''+escapeAttr(fname)+'\',mime_type:\''+escapeAttr(att.mime_type||'')+'\',size_bytes:'+(Number(att.size_bytes)||0)+'},\''+escapeAttr(counterpart||'')+'\')" style="padding:5px 10px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">Open in Skipi</button>'
         +      '</div>'
         +    '</div>'
         +  '</div>';
  });
  return html;
}

function renderMessageBubble(m, mine, opts) {
  opts = opts || {};
  var raw = m.plaintext || '';
  var time = (m.sent_at||'').slice(11,16);
  var classes = 'msg ' + (mine ? 'mine' : 'other');
  if (opts.pending) classes += ' pending';
  if (opts.failed) classes += ' failed';
  var idAttr = opts.tempId ? ' id="'+escapeAttr(opts.tempId)+'"' : '';
  var ticks = mine ? (opts.pending ? '⌛' : '✓') : '';

  // Marker-based rich messages. mine=true means "we sent this" — crewing
  // sees "You requested documents". The seafarer-side renderer mirrors this
  // and shows an action button.
  if (raw.indexOf('[skipi:request_docs]') === 0) {
    var note = raw.replace('[skipi:request_docs]','').trim()
            || 'Documents requested. Awaiting candidate response.';
    var label = mine
      ? '📄 You requested documents'
      : '📄 Crewing requested documents';
    return '<div class="'+classes+'"'+idAttr+'>'
         +   '<div class="msg-bubble" style="border:1px solid var(--accent);">'
         +     '<div style="font-weight:600;font-size:12px;margin-bottom:4px;">'+label+'</div>'
         +     '<div class="msg-text" style="font-size:12px;opacity:0.9;">'+escapeHtml(note)+'</div>'
         +     '<div class="msg-meta">'+escapeHtml(time)+(ticks?' <span>'+ticks+'</span>':'')+'</div>'
         +   '</div>'
         + '</div>';
  }
  if (raw.indexOf('[skipi:docs_response]') === 0) {
    var note2 = raw.replace('[skipi:docs_response]','').trim()
             || 'The seafarer sent the requested files.';
    var latestAtt = latestAttachmentFromSender(m.application_id, m.from_user_id);
    var openLatestBtn = latestAtt
      ? '<button onclick="openLatestAttachmentFromSender(\''+escapeAttr(m.application_id)+'\',\''+escapeAttr(m.from_user_id)+'\')" style="margin-top:7px;padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">Open documents bundle</button>'
      : '<button onclick="openLatestAttachmentFromSender(\''+escapeAttr(m.application_id)+'\',\''+escapeAttr(m.from_user_id)+'\')" style="margin-top:7px;padding:5px 12px;background:var(--panel2);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">Find received files</button>';
    return '<div class="'+classes+'"'+idAttr+'>'
         +   '<div class="msg-bubble" style="border:1px solid var(--ok);">'
         +     '<div style="font-weight:600;font-size:12px;margin-bottom:4px;">📎 Document response</div>'
         +     '<div class="msg-text" style="font-size:12px;opacity:0.9;">'+escapeHtml(note2)+'</div>'
         +     openLatestBtn
         +     '<div class="msg-meta">'+escapeHtml(time)+(ticks?' <span>'+ticks+'</span>':'')+'</div>'
         +   '</div>'
         + '</div>';
  }
  if (raw.indexOf('[skipi:doc_bundle]') === 0) {
    var bundleJson = raw.replace('[skipi:doc_bundle]','').trim();
    var bundle = {};
    try { bundle = JSON.parse(bundleJson); } catch(e){}
    var bSizeKb = bundle.size ? Math.round(bundle.size/1024)+' KB' : '';
    var myIdB = state.myIdentity ? state.myIdentity.user_id : '';
    var bCounterpart = (myIdB === m.from_user_id) ? m.to_user_id : m.from_user_id;
    var openBtn = bundle.id
      ? '<button onclick="openDocumentsBundle(\''+m.application_id+'\',\''+bundle.id+'\',\''+bCounterpart+'\',\''+escapeAttr(bundle.filename||'documents.zip')+'\')" style="margin-top:6px;padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">📂 Open documents</button>'
      : '';
    return '<div class="'+classes+'"'+idAttr+'>'
         +   '<div class="msg-bubble" style="border:1px solid var(--ok);max-width:300px;">'
         +     '<div style="display:flex;align-items:center;gap:8px;">'
         +       '<div style="font-size:24px;">🗂️</div>'
         +       '<div style="flex:1;min-width:0;">'
         +         '<div style="font-weight:600;font-size:12px;">Documents bundle</div>'
         +         '<div style="font-size:11px;opacity:0.7;">'+escapeHtml(bSizeKb)+' · structured</div>'
         +       '</div>'
         +     '</div>'
         +     openBtn
         +     '<div class="msg-meta">'+escapeHtml(time)+(ticks?' <span>'+ticks+'</span>':'')+'</div>'
         +   '</div>'
         + '</div>';
  }
  if (raw.indexOf('[skipi:file_attached]') === 0) {
    var jsonStr = raw.replace('[skipi:file_attached]','').trim();
    var info = {};
    try { info = JSON.parse(jsonStr); } catch(e){}
    var sizeKb = info.size ? Math.round(info.size/1024)+' KB' : '';
    var fname = info.filename || 'file';
    var myId = state.myIdentity ? state.myIdentity.user_id : '';
    var counterpartId = (myId === m.from_user_id) ? m.to_user_id : m.from_user_id;
    var dlBtn = info.id
      ? '<button onclick="openAttachmentInApp(\''+escapeAttr(m.application_id)+'\',{id:\''+escapeAttr(info.id)+'\',original_filename:\''+escapeAttr(fname)+'\',mime_type:\''+escapeAttr(info.mime||'')+'\',size_bytes:'+(Number(info.size)||0)+'},\''+escapeAttr(counterpartId)+'\')" style="margin-top:6px;padding:5px 12px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;">Open in Skipi</button>'
      : '';
    return '<div class="'+classes+'"'+idAttr+'>'
         +   '<div class="msg-bubble" style="border:1px solid var(--ok);max-width:300px;">'
         +     '<div style="display:flex;align-items:center;gap:8px;">'
         +       '<div style="font-size:24px;">📎</div>'
         +       '<div style="flex:1;min-width:0;">'
         +         '<div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(fname)+'</div>'
         +         '<div style="font-size:11px;opacity:0.7;">'+escapeHtml(sizeKb)+'</div>'
         +       '</div>'
         +     '</div>'
         +     dlBtn
         +     '<div class="msg-meta">'+escapeHtml(time)+(ticks?' <span>'+ticks+'</span>':'')+'</div>'
         +   '</div>'
         + '</div>';
  }

  return '<div class="'+classes+'"'+idAttr+'>'
       +   '<div class="msg-bubble">'
       +     '<div class="msg-text">'+escapeHtml(raw)+'</div>'
       +     '<div class="msg-meta">'+escapeHtml(time)+(ticks?' <span>'+ticks+'</span>':'')+'</div>'
       +   '</div>'
       + '</div>';
}

async function openDocumentsBundle(applicationId, attachmentId, counterpartId, filename) {
  if (window._bundleOpenInFlight) {
    showToast('Bundle is already opening…', 'info');
    return;
  }
  if (!attachmentId) {
    showToast('Cannot open bundle: missing attachment id.', 'error');
    return;
  }
  if (!counterpartId) {
    showToast('Cannot open bundle: missing sender identity.', 'error');
    return;
  }
  window._bundleOpenInFlight = true;
  setBundleProgress('Preparing…', 8);
  await waitUiFrame();

  var cacheKey = String(attachmentId || '');
  var cached = window._bundleSessionCache[cacheKey];
  if (cached && cached.extracted_to && cached.manifest) {
    hideBundleProgress();
    cached.application_id = applicationId;
    cached.counterpart_id = counterpartId || '';
    cached.attachment_id = attachmentId || '';
    cached.filename = filename || 'documents.zip';
    showDocumentsBundleViewer(cached);
    window._bundleOpenInFlight = false;
    return;
  }

  setBundleProgress('Downloading and decrypting…', 38);
  await waitUiFrame();
  var zipPath;
  try {
    zipPath = await invoke('download_encrypted_attachment', {
      attachmentId: attachmentId,
      counterpartUserId: counterpartId,
      originalFilename: filename || 'documents.zip',
      serverUrl: serverUrlArg(),
    });
  } catch (e) {
    hideBundleProgress();
    window._bundleOpenInFlight = false;
    showToast('Download failed: '+e, 'error');
    return;
  }

  setBundleProgress('Unpacking documents…', 74);
  await waitUiFrame();
  var bundle;
  try {
    bundle = await invoke('extract_documents_bundle', {
      applicationId: applicationId,
      zipPath: zipPath,
    });
  } catch (e) {
    hideBundleProgress();
    window._bundleOpenInFlight = false;
    showToast('Cannot extract: '+e, 'error');
    return;
  }

  setBundleProgress('Rendering viewer…', 95);
  await waitUiFrame();
  bundle.application_id = applicationId;
  bundle.counterpart_id = counterpartId || '';
  bundle.attachment_id = attachmentId || '';
  bundle.filename = filename || 'documents.zip';
  window._bundleSessionCache[cacheKey] = bundle;
  showDocumentsBundleViewer(bundle);
  hideBundleProgress();
  window._bundleOpenInFlight = false;
}

async function openAttachmentInApp(applicationId, att, counterpartId) {
  if (!att || !att.id) {
    showToast('Attachment metadata is missing.', 'error');
    return;
  }
  if (!counterpartId) {
    showToast('Cannot decrypt: missing counterpart identity.', 'error');
    return;
  }
  var fname = att.original_filename || 'file';
  var mime = String(att.mime_type || '').toLowerCase();
  var lower = String(fname || '').toLowerCase();
  var looksLikeDocsBundle = lower.indexOf('documents-bundle') !== -1
    || lower.indexOf('document') !== -1 && lower.endsWith('.zip')
    || mime.indexOf('zip') !== -1 && lower.indexOf('package') === -1;
  if (looksLikeDocsBundle) {
    await openDocumentsBundle(applicationId, att.id, counterpartId, fname);
    return;
  }

  showToast('Downloading and decrypting…', 'info');
  var path;
  try {
    path = await invoke('download_encrypted_attachment', {
      attachmentId: att.id,
      counterpartUserId: counterpartId,
      originalFilename: fname,
      serverUrl: serverUrlArg(),
    });
  } catch (e) {
    showToast('Download failed: '+e, 'error');
    return;
  }
  showSingleAttachmentViewer({
    path: path,
    filename: fname,
    mimeType: att.mime_type || '',
    sizeBytes: att.size_bytes || 0,
    applicationId: applicationId,
  });
}

function attachmentSizeLabel(bytes) {
  var n = Number(bytes || 0);
  if (!n) return '';
  if (n < 1024) return n+' B';
  if (n < 1024*1024) return Math.round(n/1024)+' KB';
  return (n/(1024*1024)).toFixed(n < 10*1024*1024 ? 1 : 0)+' MB';
}

function showSingleAttachmentViewer(info) {
  var path = info.path || '';
  var filename = info.filename || path.split('/').pop() || 'file';
  var ext = filename.split('.').pop().toLowerCase();
  var mime = String(info.mimeType || '').toLowerCase();
  var fileUri = convertFileSrc(path);
  var overlay = document.createElement('div');
  overlay.id = 'single-attachment-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99999;display:flex;align-items:center;justify-content:center;';
  var modal = document.createElement('div');
  modal.style.cssText = 'background:var(--panel);border:1px solid var(--border);border-radius:8px;width:94%;max-width:1050px;height:90vh;color:var(--text);display:flex;flex-direction:column;box-shadow:0 6px 24px rgba(0,0,0,0.5);overflow:hidden;';

  var size = attachmentSizeLabel(info.sizeBytes);
  var body = '';
  if (ext === 'pdf' || mime === 'application/pdf') {
    body = '<iframe src="'+escapeAttr(fileUri)+'" style="width:100%;height:100%;border:none;background:#fff;"></iframe>';
  } else if (['png','jpg','jpeg','gif','webp','bmp'].indexOf(ext) !== -1 || mime.indexOf('image/') === 0) {
    body = '<div style="height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:18px;">'
         +   '<img src="'+escapeAttr(fileUri)+'" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:4px;">'
         + '</div>';
  } else {
    body = '<div style="height:100%;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--text2);font-size:13px;text-align:center;padding:24px;">'
         +   '<div><div style="font-size:36px;margin-bottom:12px;">📎</div>'
         +   '<div>Inline preview is not available for .'+escapeHtml(ext || 'file')+'.</div>'
         +   '<div style="margin-top:6px;font-size:12px;">Use Open in system viewer.</div></div>'
         + '</div>';
  }

  modal.innerHTML = ''
    + '<div style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);">'
    +   '<div style="min-width:0;flex:1;">'
    +     '<div style="font-size:15px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">📎 '+escapeHtml(filename)+'</div>'
    +     '<div style="font-size:12px;color:var(--text2);margin-top:2px;">'+escapeHtml([mime, size].filter(Boolean).join(' · '))+'</div>'
    +   '</div>'
    +   '<button id="single-open-system" style="background:var(--accent);border:none;color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;">Open in system viewer</button>'
    +   '<button id="single-close" style="background:transparent;border:1px solid var(--border);color:var(--text);padding:5px 12px;border-radius:4px;cursor:pointer;font-size:12px;">Close</button>'
    + '</div>'
    + '<div style="flex:1;min-height:0;">'+body+'</div>';
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  modal.querySelector('#single-close').onclick = function(){ document.body.removeChild(overlay); };
  overlay.onclick = function(e){ if (e.target === overlay) document.body.removeChild(overlay); };
  modal.querySelector('#single-open-system').onclick = async function(){
    try { await invoke('open_path_with_default', { path: path }); }
    catch(e) { showToast('Could not open externally: '+e, 'warn'); }
  };
  showToast('Opened in Skipi.', 'success');
}

function ensureBundleProgressOverlay() {

function setBundleProgress(stage, percent) {

function hideBundleProgress() {

function waitUiFrame() {
  return new Promise(function(resolve){
    setTimeout(resolve, 0);
  });
}

function findApplicationById(applicationId) {
  var pools = [state.applications || []];
  Object.keys(state.applicationsByVacancy || {}).forEach(function(k){
    if (Array.isArray(state.applicationsByVacancy[k])) pools.push(state.applicationsByVacancy[k]);
  });
  for (var p = 0; p < pools.length; p++) {
    for (var i = 0; i < pools[p].length; i++) {
      if (pools[p][i] && pools[p][i].id === applicationId) return pools[p][i];
    }
  }
  return null;
}

function latestPdfAttachmentFromSender(applicationId, senderUserId) {
  var atts = (state.attachmentsByApp && state.attachmentsByApp[applicationId]) || [];
  var matches = atts.filter(function(a){
    var name = String(a.original_filename || '').toLowerCase();
    var mime = String(a.mime_type || '').toLowerCase();
    return a && a.id
      && (!senderUserId || a.from_user_id === senderUserId)
      && (name.endsWith('.pdf') || mime.indexOf('pdf') !== -1);
  });
  matches.sort(function(a,b){ return String(b.sent_at||'').localeCompare(String(a.sent_at||'')); });
  return matches[0] || null;
}

async function saveCurrentBundleSeafarer() {
  var data = window._bundleViewerData;
  if (!data || !data.manifest) {
    showToast('No opened document bundle to save.', 'warn');
    return;
  }
  var app = findApplicationById(data.applicationId) || {};
  var summary = app.summary || null;
  var seafarerId = data.counterpartId || app.seafarer_user_id || sUidOf(app) || '';
  var cvPath = null;
  var cvAtt = latestPdfAttachmentFromSender(data.applicationId, seafarerId);
  if (cvAtt && seafarerId) {
    try {
      cvPath = await invoke('download_encrypted_attachment', {
        attachmentId: cvAtt.id,
        counterpartUserId: seafarerId,
        originalFilename: cvAtt.original_filename || 'CV.pdf',
        serverUrl: serverUrlArg(),
      });
    } catch(e) {
      console.log('CV save skipped:', e);
    }
  }
  try {
    var saved = await invoke('save_seafarer_from_bundle', {
      applicationId: data.applicationId,
      seafarerUserId: seafarerId,
      manifest: data.manifest,
      extractedTo: data.extractedTo,
      applicantSummary: summary,
      cvPath: cvPath,
    });
    var idx = (state.seafarers||[]).findIndex(function(s){return s.id===saved.id;});
    if (idx >= 0) state.seafarers[idx] = saved;
    else state.seafarers.unshift(saved);
    state.selectedSeafarer = saved;
    delete state.seafarerDocsById[saved.id];
    showToast('Saved to Seafarers DB.', 'success');
    var overlay = document.getElementById('bundle-overlay');
    if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
    showView('seafarers');
  } catch(e) {
    showToast('Save failed: '+e, 'error');
  }
}

    +   '<div id="bundle-tree" style="width:300px;border-right:1px solid var(--border);overflow-y:auto;padding:8px 6px;background:var(--panel);"></div>'
    +   '<div id="bundle-detail" style="flex:1;overflow-y:auto;padding:18px 22px;background:var(--bg);"></div>'
    + '</div>';
  overlay.appendChild(modal);
  document.body.appendChild(overlay);
  modal.querySelector('#bundle-close').onclick = function(){ document.body.removeChild(overlay); };
  modal.querySelector('#bundle-save-local').onclick = saveCurrentBundleSeafarer;
  overlay.onclick = function(e){ if (e.target === overlay) document.body.removeChild(overlay); };

  paintBundleTree(byCat, categoryOrder);
  paintBundleDetail(null);
}

function bundleDocStatus(d){
  if (!d.file_name) return {color: 'var(--err)', label: 'no file'};
  if (!d.valid_to) return {color: 'var(--text2)', label: ''};
  var todayIso = new Date().toISOString().slice(0,10);
  if (d.valid_to < todayIso) return {color: 'var(--err)', label: 'EXPIRED'};
  var diff = (new Date(d.valid_to) - new Date(todayIso)) / (1000*60*60*24);
  if (diff < 30) return {color: 'var(--err)', label: '<30 days'};
  if (diff < 90) return {color: 'var(--warn)', label: '<90 days'};
  if (diff < 180) return {color: '#eac94f', label: '<180 days'};
  if (diff < 365) return {color: '#f7e38d', label: '<1 year'};
  return {color: 'var(--ok)', label: 'valid'};
}

function paintBundleTree(byCat, categoryOrder) {
  var host = document.getElementById('bundle-tree');
  if (!host) return;
  // Sort docs inside each category: templates first, then alpha by title.
  Object.keys(byCat).forEach(function(c){
    byCat[c].sort(function(a,b){
      if ((a.is_template?0:1) !== (b.is_template?0:1)) return a.is_template?-1:1;
      return (a.title||'').localeCompare(b.title||'');
    });
  });
  var html = '';
  categoryOrder.forEach(function(cat){
    var open = window._bundleState.collapsed && window._bundleState.collapsed[cat] ? false : true;
    html += '<div class="bnd-cat" style="margin-bottom:2px;">';
    html +=   '<div onclick="toggleBundleCategory(\''+escapeAttr(cat)+'\')" style="display:flex;align-items:center;gap:6px;padding:6px 8px;cursor:pointer;font-size:12px;font-weight:600;color:var(--text);">'
            +   '<span style="font-size:9px;width:10px;display:inline-block;">'+(open?'▼':'▶')+'</span>'
            +   '<span style="flex:1;">'+escapeHtml(cat)+'</span>'
            +   '<span style="font-size:11px;color:var(--text2);">'+byCat[cat].length+'</span>'
            + '</div>';
    if (open) {
      byCat[cat].forEach(function(d){
        var st = bundleDocStatus(d);
        var sel = window._bundleState.selected === d.id;
        html += '<div onclick="selectBundleDoc(\''+escapeAttr(d.id)+'\')" '
              +     'style="display:flex;align-items:center;gap:6px;padding:5px 8px 5px 22px;cursor:pointer;border-radius:4px;'
              +     (sel?'background:var(--accent);color:#fff;':'')+'">'
              +   '<span style="font-size:11px;">'+(d.is_template?'⭐':'📄')+'</span>'
              +   '<span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+escapeHtml(d.title||'(untitled)')+'</span>'
              +   '<span style="width:8px;height:8px;border-radius:50%;background:'+st.color+';flex-shrink:0;" title="'+escapeAttr(st.label)+'"></span>'
              + '</div>';
      });
    }
    html += '</div>';
  });
  host.innerHTML = html || '<div style="padding:20px;text-align:center;color:var(--text2);font-size:12px;">Bundle is empty.</div>';
}

function toggleBundleCategory(cat){
  if (!window._bundleState.collapsed) window._bundleState.collapsed = {};
  window._bundleState.collapsed[cat] = !window._bundleState.collapsed[cat];
  // Re-render tree from current data.
  var data = window._bundleViewerData;
  if (!data) return;
  var byCat = {};
  data.docs.forEach(function(d){
    var c = d.category || 'Other';
    (byCat[c] = byCat[c] || []).push(d);
  });
  var preferredOrder = ['Certificate of Competency','STCW Mandatory','Deck Training','Engine Training','Medical','Visas','Identity','Custom'];
  var ord = preferredOrder.filter(function(c){return byCat[c];})
    .concat(Object.keys(byCat).filter(function(c){return preferredOrder.indexOf(c)<0;}).sort());
  paintBundleTree(byCat, ord);
}

function selectBundleDoc(id){
  window._bundleState.selected = id;
  var data = window._bundleViewerData;
  if (!data) return;
  var doc = data.docs.find(function(d){return d.id === id;});
  // Re-render tree to update active highlight.
  var byCat = {};
  data.docs.forEach(function(d){
    var c = d.category || 'Other';
    (byCat[c] = byCat[c] || []).push(d);
  });
  var preferredOrder = ['Certificate of Competency','STCW Mandatory','Deck Training','Engine Training','Medical','Visas','Identity','Custom'];
  var ord = preferredOrder.filter(function(c){return byCat[c];})
    .concat(Object.keys(byCat).filter(function(c){return preferredOrder.indexOf(c)<0;}).sort());
  paintBundleTree(byCat, ord);
  paintBundleDetail(doc);
}

function paintBundleDetail(d) {
  var host = document.getElementById('bundle-detail');
  if (!host) return;
  if (!d) {
    host.innerHTML = '<div style="text-align:center;color:var(--text2);font-size:13px;padding:40px;">Select a document on the left.</div>';
    return;
  }
  var data = window._bundleViewerData;
  var st = bundleDocStatus(d);
  var hasFile = !!d.file_name;
  var openPath = (data && data.extractedTo && d.file_path) ? (data.extractedTo+'/'+d.file_path) : '';
  var ext = (d.file_name||'').split('.').pop().toLowerCase();

  var fields = [
    ['Category', d.category],
    ['Doc number', d.doc_number],
    ['Issued by', d.issued_by],
    ['Valid from', d.valid_from],
    ['Valid to', d.valid_to],
    ['Status', st.label || (hasFile?'on file':'no file')],
    ['Filename', d.file_name],
  ].filter(function(r){ return r[1]; });

  var html = ''
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;">'
    +   '<div style="flex:1;min-width:0;">'
    +     '<h2 style="margin:0;font-size:18px;display:flex;align-items:center;gap:8px;">'
    +       '<span>'+(d.is_template?'⭐':'📄')+'</span>'
    +       '<span>'+escapeHtml(d.title||'(untitled)')+'</span>'
    +     '</h2>'
    +     '<div style="font-size:12px;color:var(--text2);margin-top:4px;">'+escapeHtml(d.category||'')+(d.is_template?' · required template':' · custom')+'</div>'
    +   '</div>';
  if (hasFile) {
    html += '<button onclick="invoke(\'open_path_with_default\',{path:\''+escapeAttr(openPath)+'\'})" '
          +    'style="padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:13px;cursor:pointer;font-weight:600;flex-shrink:0;">'
          +   'Open file</button>';
    html += '<button onclick="enableBundlePreview(\''+escapeAttr(d.id)+'\')" '
          +    'style="margin-left:8px;padding:8px 12px;background:transparent;color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:12px;cursor:pointer;font-weight:600;flex-shrink:0;">'
          +   (window._bundlePreviewEnabled[d.id] ? 'Preview loaded' : 'Load preview')
          + '</button>';
  }
  html += '</div>';

  // Status badge bar (color + label) — same visual cue as seafarer's tree dots.
  if (st.label) {
    html += '<div style="display:inline-block;padding:4px 10px;background:'+st.color+';color:#000;border-radius:4px;font-size:11px;font-weight:600;margin-bottom:14px;text-transform:uppercase;">'+escapeHtml(st.label)+'</div>';
  }

  // Field grid.
  if (fields.length) {
    html += '<div class="card" style="background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:14px 16px;margin-bottom:14px;">';
    html +=   '<div style="display:grid;grid-template-columns:140px 1fr;row-gap:8px;column-gap:14px;font-size:13px;">';
    fields.forEach(function(r){
      html += '<div style="color:var(--text2);">'+escapeHtml(r[0])+'</div>'
            + '<div>'+escapeHtml(r[1])+'</div>';
    });
    html +=   '</div>';
    html += '</div>';
  }

  // Inline preview for PDFs/images via local file path. Tauri's WebKit can
  // render file:// URIs when allowed by the assets scope; if blocked, the
  // user always has the "Open file" button above.
  if (hasFile && openPath && window._bundlePreviewEnabled[d.id]) {
    // Tauri's WebKit blocks file:// in iframes/img — must go through the
    // assets protocol (configured in tauri.conf.json security.assetProtocol).
    var fileUri = convertFileSrc(openPath);
    if (ext === 'pdf') {
      html += '<iframe src="'+escapeAttr(fileUri)+'" style="width:100%;height:65vh;border:1px solid var(--border);border-radius:6px;background:#fff;"></iframe>';
    } else if (['png','jpg','jpeg','gif','webp','bmp'].indexOf(ext) !== -1) {
      html += '<div style="text-align:center;padding:14px;background:var(--panel2);border-radius:6px;border:1px solid var(--border);"><img src="'+escapeAttr(fileUri)+'" style="max-width:100%;max-height:65vh;border-radius:4px;"></div>';
    } else {
      html += '<div style="font-size:12px;color:var(--text2);padding:14px;background:var(--panel2);border-radius:6px;border:1px solid var(--border);">'
            + 'Inline preview not supported for .'+escapeHtml(ext)+' — click <strong>Open file</strong> to view in your default app.'
            + '</div>';
    }
  } else if (hasFile && openPath && !window._bundlePreviewEnabled[d.id]) {
    html += '<div style="font-size:12px;color:var(--text2);padding:14px;background:var(--panel2);border-radius:6px;border:1px solid var(--border);">'
          + 'Preview is disabled by default for performance. Click <strong>Load preview</strong> if needed.'
          + '</div>';
  } else if (!hasFile) {
    html += '<div style="font-size:12px;color:var(--err);padding:14px;background:var(--panel2);border-radius:6px;border:1px solid var(--border);">No file attached for this entry.</div>';
  }
  host.innerHTML = html;
}

function enableBundlePreview(docId) {
  if (!docId) return;
  window._bundlePreviewEnabled[docId] = true;
  var data = window._bundleViewerData;
  if (!data || !Array.isArray(data.docs)) return;
  var doc = data.docs.find(function(d){ return d.id === docId; });
  if (doc) paintBundleDetail(doc);
}

async function downloadCrewingAttachment(attachmentId, counterpartId, filename) {
  showToast('Downloading and decrypting…', 'info');
  try {
    if (!counterpartId) throw new Error('missing counterpart identity');
    var path = await invoke('download_encrypted_attachment', {
      attachmentId: attachmentId,
      counterpartUserId: counterpartId,
      originalFilename: filename,
      serverUrl: serverUrlArg(),
    });
    try {
      await invoke('open_path_with_default', { path: path });
      showToast('Saved and opened: '+path, 'success');
    } catch(e) {
      showToast('Saved, but could not open automatically: '+path+' — '+e, 'warn');
    }
  } catch (e) {
    showToast('Download failed: '+e, 'error');
  }
}

async function requestDocs(applicationId, seafarerUserId) {
  var host = document.getElementById('appthread-'+applicationId);
  if (!host) return;
  var counterpart = host.dataset.counterpartId || seafarerUserId || host.dataset.seafarerUserId;
  if (!counterpart) {
    showToast('No counterpart yet — wait for the candidate to apply first.', 'error');
    return;
  }
  var box = document.getElementById('app-msgs-'+applicationId);
  var status = document.getElementById('app-status-'+applicationId);
  var marker = '[skipi:request_docs] Please send your documents (CV + relevant certificates) for review.';
  var tempId = 'tmp-'+Date.now();
  var nowIso = new Date().toISOString();
  if (box) {
    var emptyEl = box.querySelector('.chat-empty');
    if (emptyEl) emptyEl.remove();
    box.insertAdjacentHTML('beforeend', renderMessageBubble(
      {plaintext: marker, sent_at: nowIso}, true,
      {pending: true, tempId: tempId}
    ));
    box.scrollTop = box.scrollHeight;
  }
  await new Promise(function(r){ requestAnimationFrame(function(){ requestAnimationFrame(r); }); });
  try {
    try { await registerMessagingPubkey(); } catch(e){}
    await invoke('send_encrypted_message', {
      applicationId: applicationId,
      toUserId: counterpart,
      plaintext: marker,
      serverUrl: serverUrlArg(),
    });
    var pendingEl = document.getElementById(tempId);
    if (pendingEl) pendingEl.classList.remove('pending');
    var tickSpan = pendingEl ? pendingEl.querySelector('.msg-meta span') : null;
    if (tickSpan) tickSpan.textContent = '✓';
    setTimeout(function(){ refreshApplicationChat(applicationId, counterpart, true); }, 0);
  } catch (e) {
    var pendingEl = document.getElementById(tempId);
    if (pendingEl) { pendingEl.classList.remove('pending'); pendingEl.classList.add('failed'); }
    if (status) { status.textContent = 'Send failed: '+e; status.style.color = 'var(--err)'; }
  }
}

function formatDayLabel(dayIso) {
  if (!dayIso) return '';
  var today = new Date().toISOString().slice(0,10);
  if (dayIso === today) return 'Today';
  var d = new Date(dayIso+'T00:00:00');
  var yest = new Date(); yest.setDate(yest.getDate()-1);
  if (dayIso === yest.toISOString().slice(0,10)) return 'Yesterday';
  return d.toLocaleDateString(undefined, {day:'numeric', month:'short', year:'numeric'});
}

// Soft-refresh: fetches messages and patches only the messages container.
// Does not rebuild the textarea/status/poll timer, so no flicker, no
// composer wipe.
async function refreshApplicationChat(applicationId, seafarerUserId, silent) {
  var msgsBox = document.getElementById('app-msgs-'+applicationId);
  if (!msgsBox) return;
  var msgs;
  try { msgs = await invoke('fetch_messages', { applicationId: applicationId, serverUrl: serverUrlArg() }); }
  catch (e) {
    if (!silent) {
      var st = document.getElementById('app-status-'+applicationId);
      if (st) { st.textContent = 'Refresh failed: '+e; st.style.color = 'var(--err)'; }
    }
    return;
  }
  var atts = [];
  try {
    atts = await invoke('fetch_attachments_for_application', { applicationId: applicationId, serverUrl: serverUrlArg() });
  } catch(e) {
    atts = state.attachmentsByApp[applicationId] || [];
  }
  state.messagesByApp[applicationId] = msgs;
  state.attachmentsByApp[applicationId] = atts || [];
  // Skip DOM update if nothing changed — avoids scroll jumps during typing.
  var pendingCount = msgsBox.querySelectorAll('.msg.pending').length;
  var newCount = msgs.length + (atts || []).length + pendingCount;
  var prevCount = parseInt(msgsBox.dataset.msgCount || '-1', 10);
  if (newCount === prevCount) return;
  // Preserve scroll-at-bottom intent.
  var nearBottom = (msgsBox.scrollHeight - msgsBox.scrollTop - msgsBox.clientHeight) < 30;
  msgsBox.innerHTML = renderApplicationMessages(msgs)
    + renderApplicationAttachmentFallbacks(applicationId, atts, msgs);
  msgsBox.dataset.msgCount = String(msgs.length + (atts || []).length);
  if (nearBottom) msgsBox.scrollTop = msgsBox.scrollHeight;
}

async function sendApplicationReply(applicationId, seafarerUserId) {
  var host = document.getElementById('appthread-'+applicationId);
  var input = document.getElementById('app-compose-'+applicationId);
  var status = document.getElementById('app-status-'+applicationId);
  var box = document.getElementById('app-msgs-'+applicationId);
  if (!host || !input) return;
  var text = (input.value||'').trim();
  if (!text) return;

  // Resolve counterpart from cached state — no network round-trip on send.
  var counterpart = host.dataset.counterpartId || seafarerUserId || host.dataset.seafarerUserId;
  if (!counterpart) {
    if (status) { status.textContent = 'No counterpart yet.'; status.style.color = 'var(--err)'; }
    return;
  }

  // Optimistic UI: clear input + append "pending" bubble immediately.
  input.value = '';
  input.style.height = 'auto';
  var tempId = 'tmp-'+Date.now();
  var nowIso = new Date().toISOString();
  if (box) {
    // Remove the empty-state placeholder if present.
    var emptyEl = box.querySelector('.chat-empty');
    if (emptyEl) emptyEl.remove();
    box.insertAdjacentHTML('beforeend', renderMessageBubble(
      {plaintext: text, sent_at: nowIso}, true,
      {pending: true, tempId: tempId}
    ));
    box.scrollTop = box.scrollHeight;
  }
  input.focus();
  // Yield to the renderer so the bubble actually paints before we run the
  // (potentially slow) Tauri invoke. Without this, WebKit batches the DOM
  // mutation with the post-await microtasks and the bubble appears only
  // after invoke returns.
  await new Promise(function(r){ requestAnimationFrame(function(){ requestAnimationFrame(r); }); });

  try {
    try { await registerMessagingPubkey(); } catch(e){}
    await invoke('send_encrypted_message', {
      applicationId: applicationId,
      toUserId: counterpart,
      plaintext: text,
      serverUrl: serverUrlArg(),
    });
    var pendingEl = document.getElementById(tempId);
    if (pendingEl) pendingEl.classList.remove('pending');
    var tickSpan = pendingEl ? pendingEl.querySelector('.msg-meta span') : null;
    if (tickSpan) tickSpan.textContent = '✓';
    // Pull authoritative state on next idle tick — non-blocking.
    setTimeout(function(){ refreshApplicationChat(applicationId, counterpart, true); }, 0);
  } catch (e) {
    var pendingEl = document.getElementById(tempId);
    if (pendingEl) { pendingEl.classList.remove('pending'); pendingEl.classList.add('failed'); }
    if (status) { status.textContent = 'Send failed: '+e; status.style.color = 'var(--err)'; }
    // Restore text so user can retry.
    input.value = text;
  }
}

async function submitVacancy() {
  var draft = {
    title: val('f-title'),
    rank: val('f-rank'),
    vessel_type: val('f-vtype'),
    vessel_name: val('f-vname') || null,
    vessel_imo: val('f-imo') || null,
    flag: val('f-flag') || null,
    join_date: val('f-jdate') || null,
    join_port: val('f-jport') || null,
    contract_months: parseIntOrNull('f-months'),
    salary_min: parseFloatOrNull('f-smin'),
    salary_max: parseFloatOrNull('f-smax'),
    salary_currency: val('f-cur') || null,
    trading_area: val('f-trade') || null,
    trading_russia_ok: document.getElementById('f-russia').checked,
    nationalities: cdValues('f-nationalities'),
    description: val('f-desc') || null,
    client_name: val('f-client') || null,
  };
  if (!draft.title || !draft.rank || !draft.vessel_type || !draft.vessel_imo) {
    showToast('Title, Rank, Vessel type and IMO are required', 'error');
    return;
  }
  if (!draft.nationalities || !draft.nationalities.length) {
    showToast('Select at least one nationality — vacancies are matched by citizenship.', 'error');
    return;
  }
  // IMO is exactly 7 digits per IMO Resolution A.600(15). Server validates
  // 1_000_000..9_999_999 — surface the error inline before the round-trip.
  if (!/^\d{7}$/.test(String(draft.vessel_imo))) {
    showToast('IMO must be exactly 7 digits (e.g. 9554488).', 'error');
    return;
  }
  try {
    var posted = await invoke('post_vacancy', { draft: draft });
    showToast('Posted ✓ id '+posted.id, 'success');
    showView('vacancies');
  } catch (e) {
    showToast(''+e, 'error');
  }
}

function val(id){ var el=document.getElementById(id); return el ? (el.value||'').trim() : ''; }
function selectedValues(id){
  var el=document.getElementById(id);
  if(!el)return null;
  var vals=Array.prototype.slice.call(el.selectedOptions||[]).map(function(o){return (o.value||o.textContent||'').trim();}).filter(Boolean);
  return vals.length ? vals : null;
}
function parseIntOrNull(id){ var v=val(id); return v===''?null:parseInt(v,10); }
function parseFloatOrNull(id){ var v=val(id); return v===''?null:parseFloat(v); }

// Build a setting-row: label + description + control on the right.
function settingRow(label, desc, controlHtml) {
  return '<div class="setting-row">'
    + '<div class="setting-info">'
    + '<div class="setting-label">'+escapeHtml(label)+'</div>'
    + (desc ? '<div class="setting-desc">'+desc+'</div>' : '')
    + '</div>'
    + '<div class="setting-control">'+controlHtml+'</div>'
    + '</div>';
}

function inputCtrl(id, value, type, placeholder, width) {
  return '<input type="'+(type||'text')+'" id="'+id+'" value="'+escapeAttr(value||'')+'"'
    + (placeholder ? ' placeholder="'+escapeAttr(placeholder)+'"' : '')
    + (width ? ' style="width:'+width+';"' : '') + '>';
}

function textareaCtrl(id, value, placeholder, width, rows) {
  return '<textarea id="'+id+'" rows="'+(rows||4)+'"'
    + (placeholder ? ' placeholder="'+escapeAttr(placeholder)+'"' : '')
    + ' style="width:'+(width||'320px')+';min-height:92px;resize:vertical;">'
    + escapeHtml(value||'') + '</textarea>';
}

function selectCtrl(id, value, options) {
  // options: [[v, label, disabled?], ...]
  return '<select id="'+id+'">'
    + options.map(function(o){
        return '<option value="'+escapeAttr(o[0])+'"'
          + (value===o[0]?' selected':'')
          + (o[2]?' disabled':'')
          + '>'+escapeHtml(o[1])+'</option>';
      }).join('')
    + '</select>';
}

async function switchToVault(path) {
  var s = state.settings || {};
  var recent = (s.recent_vaults || []).filter(Boolean);
  if (s.vault_path && !recent.includes(s.vault_path)) recent.unshift(s.vault_path);
  recent = recent.filter(function(p){return p !== path;}).slice(0, 8);
  var newSettings = Object.assign({}, s, { vault_path: path, recent_vaults: recent });
  try {
    await invoke('save_settings', { newSettings: newSettings });
    state.settings = newSettings;
    updateVaultLabel();
    showToast('Vault set. Restart Skipi Crewing to apply.', 'success');
    renderSettingsModal();
  } catch (e) {
    showToast('Could not save: '+e, 'error');
  }
}

async function forgetVault(path) {
  var s = state.settings || {};
  var recent = (s.recent_vaults || []).filter(function(p){return p && p !== path;});
  var newSettings = Object.assign({}, s, { recent_vaults: recent });
  try {
    await invoke('save_settings', { newSettings: newSettings });
    state.settings = newSettings;
    renderSettingsModal();

    showToast('Token validation failed: '+e, 'error');
  }
}

  var pick = function(id, fallback) { var el=document.getElementById(id); return el ? el.value.trim() : fallback; };

  var newSettings = {
    server_url: pick('s-url', s.server_url||''),
    bearer_token: pick('s-token', s.bearer_token||''),
    crewing_id: pick('s-crewing-id', s.crewing_id||''),
    company_name: pick('s-company', s.company_name||''),
    reply_to: pick('s-reply', s.reply_to||''),
    vault_path: pick('v-path', s.vault_path||''),
    recent_vaults: s.recent_vaults || [],
    profile: {
      legal_name:           pick('p-legal',  p.legal_name||''),
      jurisdiction:         pick('p-jur',    p.jurisdiction||''),
      registration_number:  pick('p-reg',    p.registration_number||''),
      mlc_cert_number:      pick('p-mlc',    p.mlc_cert_number||''),
      mlc_cert_valid_to:    pick('p-mlc-to', p.mlc_cert_valid_to||''),
      contact_email:        pick('p-email',  p.contact_email||''),
      contact_phone:        pick('p-phone',  p.contact_phone||''),
      slug:                 pick('p-slug',   p.slug||''),
      public_description:   pick('p-public-desc', p.public_description||''),
    },
    interface: {
      theme:    pick('i-theme', iface.theme||'dark'),
      language: pick('i-lang',  iface.language||'en'),
    },
  };
  try {
    await invoke('save_settings', { newSettings: newSettings });
    state.settings = newSettings;
    applyTheme();
    try {
      var syncResult = await invoke('sync_crewing_profile');
      if (String(syncResult||'').indexOf('synced') === 0) {

    showToast(''+e, 'error');

function escapeHtml(s){ return (s||'').replace(/[<>&"]/g, function(c){ return {'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]; }); }

async function checkForUpdates() {
  try {
    var updater = window.__TAURI__.updater;
    var update = null;
    if (updater && updater.check) {
      update = await updater.check();
    } else {
      var result = await invoke('plugin:updater|check');
      update = (result && result.available) ? result : null;
    }
    if (update && update.available) {
      state.pendingUpdate = update;
      showUpdateBanner(update);
    }
  } catch (e) {
    console.log('updater check failed:', e);
  }
}

function showUpdateBanner(update) {
  var v = update.version || '';
  var current = update.currentVersion || '';
  var html =
    '<div class="update-banner">'
    + '<div class="ub-msg">Skipi Crewing '+escapeHtml(v)+' is available'+(current?' (current '+escapeHtml(current)+')':'')+'</div>'
    + '<button onclick="doInstallUpdate()">Install now</button>'
    + '<button onclick="openDebFolder()">Open download folder</button>'
    + '<span class="ub-close" onclick="hideUpdateBanner()" title="Dismiss">×</span>'
    + '</div>';
  document.getElementById('update-banner-host').innerHTML = html;
  // Push main content down by banner height so first row isn't covered.
  document.querySelector('main').style.paddingTop = '52px';
}

function hideUpdateBanner() {
  document.getElementById('update-banner-host').innerHTML = '';
  document.querySelector('main').style.paddingTop = '';
  state.pendingUpdate = null;
}

async function doInstallUpdate() {
  var update = state.pendingUpdate;
  if (!update) return;
  showToast('Downloading update...', 'info');
  try {
    if (update.downloadAndInstall) {
      await update.downloadAndInstall();
    } else {
      await invoke('plugin:updater|download_and_install');
    }
    showToast('Update installed. Restarting…', 'success');
    hideUpdateBanner();
    // Auto-relaunch so the user doesn't have to close/reopen manually.
    setTimeout(async function(){
      try {
        if (window.__TAURI__.process && window.__TAURI__.process.relaunch) {
          await window.__TAURI__.process.relaunch();
        } else {
          await invoke('plugin:process|restart');
        }
      } catch (e) {
        showToast('Restart failed: '+e+'. Close and reopen Skipi Crewing manually.', 'warn');
      }
    }, 800);
  } catch (e) {
    // Linux .deb: auto-install fails. Walk the user through manual install.
    showToast('On Linux .deb the new package must be installed manually. Click "Open download folder".', 'warn');
  }
}

async function openDebFolder() {
  // Try to surface the platform-specific download folder. On dev (this
  // machine) the .deb sits in the build tree; on a real install the OS
  // download folder is what the user expects. We just toast a hint and
  // copy the dpkg command to the clipboard for one-shot install.
  var cmd = 'sudo dpkg -i ~/Downloads/Skipi-Crewing_'+(state.pendingUpdate&&state.pendingUpdate.version||'latest')+'_amd64.deb';
  try {
    if (window.__TAURI__.clipboardManager && window.__TAURI__.clipboardManager.writeText) {
      await window.__TAURI__.clipboardManager.writeText(cmd);
      showToast('Install command copied to clipboard. Download .deb from the GitHub release page (Skipi Crewing in skipi.app), then paste in terminal.', 'info');
    } else {
      showToast('Run: '+cmd, 'info');
    }
  } catch (e) {
    showToast('Run: '+cmd, 'info');
  }
}

// ------------- drag-drop file from OS (Tauri v2 webview events) -------------
async function setupFileDragDrop() {
  if (!window.__TAURI__ || !window.__TAURI__.event) return;
  var listen = window.__TAURI__.event.listen;
  var onDrop = function(payload){
    if (!payload || !payload.paths || !payload.paths.length) return;
    var sourcePath = payload.paths[0];
    var d = state.selectedDocument;
    if (state.view !== 'documents' || !d) {
      showToast('Open a document first, then drop the file', 'warn');
      return;
    }
    invoke('attach_file_to_document', { docId: d.id, sourcePath: sourcePath }).then(function(updated){
      state.selectedDocument = updated;
      showToast('File attached: '+sourcePath.split('/').pop(), 'success');
      renderDocumentsTree().then(function(){ renderDocumentDetail(); });
    }).catch(function(e){ showToast('Attach failed: '+e, 'error'); });
  };
  // Tauri 2 event names
  ['tauri://drag-drop','tauri://file-drop'].forEach(function(name){
    try { listen(name, function(ev){ onDrop(ev.payload); }); } catch(e){}
  });
}

function applyTheme() {
  var t = ((state.settings && state.settings.interface && state.settings.interface.theme) || 'dark').toLowerCase();
  document.documentElement.setAttribute('data-theme', t === 'light' ? 'light' : 'dark');
}

async function silentRefreshVacancies() {
  if (state.view !== 'vacancies' && state.view !== 'new') return;
  try {
    var fresh = await invoke('fetch_my_vacancies');
    state.vacancies = fresh;
    renderVacanciesTreeBody();
    if (state.selectedVacancy) {
      var still = fresh.find(function(v){ return v.id === state.selectedVacancy.id; });
      if (still) {
        state.selectedVacancy = still;
        // Pull applications quietly too.
        try {
          var qfilter = currentComplianceFilter(still.id);
          var qkey = applicationsCacheKey(still.id, qfilter);
          var apps = await invoke('fetch_applications_for_vacancy', {
            vacancyId: still.id,
            filter: { include_compliance: true,
                      missing_required: qfilter.missing_required,
                      expired_required: qfilter.expired_required,
                      months_in_rank:   qfilter.months_in_rank,
                      required_cert:    qfilter.required_cert },
          });
          state.applicationsByVacancy[qkey] = apps;
          if (state.selectedVacancy && state.selectedVacancy.id === still.id) {
            state.applications = apps;
            // Don't blow away the DOM if a chat thread is open — that
            // collapses it under the user's hands. The in-chat 15s poll
            // keeps that conversation fresh on its own. Only repaint
            // when nothing is expanded.
            var anyOpen = document.querySelector('[id^="appthread-"][data-loaded="1"]');
            if (!anyOpen) paintApplicationsList(apps);
          }
        } catch(e){}
      }
    }
  } catch(e){}
}

// Phase 2: register this Crewing app's X25519 pubkey on startup so the
// seafarer side can encrypt to us. Idempotent — safe to call every launch.
async function autoRegisterMessagingPubkey() {
  var s = state.settings || {};
  if (!s.crewing_id) {
    console.log('Skipping pubkey registration — crewing_id not set in Settings');
    return;
  }
  try {
    state.myIdentity = await registerMessagingPubkey();
    console.log('Skipi messaging identity:', state.myIdentity.user_id);
  } catch (e) {
    console.log('Pubkey register failed (will retry on next launch):', e);
  }
}

function registerMessagingPubkey() {
  var s = state.settings || {};
  return invoke('register_my_pubkey', {
    crewingId: s.crewing_id || '',
    bearerToken: s.bearer_token || '',
    serverUrl: s.server_url || ''
  });
}

function serverUrlArg() {
  return (state.settings && state.settings.server_url) || '';
}
</script>
