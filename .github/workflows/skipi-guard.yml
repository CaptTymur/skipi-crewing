name: skipi-guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout skipi-guard
        uses: actions/checkout@v4
        with:
          repository: CaptTymur/skipi-guard
          ref: 46ebbdeada596d939fef01a042513fea0fec7a5c
          path: .skipi-guard

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkout skipi-host-runtime
        uses: actions/checkout@v4
        with:
          repository: CaptTymur/skipi-host-runtime
          ref: d6238191c554bc370983366672c41b41116754ce
          path: .skipi-host-runtime

      - name: Prepare host runtime for guard harness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/../skipi-plugins"
          ln -sfn "$GITHUB_WORKSPACE/.skipi-host-runtime" "$GITHUB_WORKSPACE/../skipi-plugins/_host-runtime"
          sudo mkdir -p /home/linux/Developer/skipi-plugins
          sudo ln -sfn "$GITHUB_WORKSPACE/.skipi-host-runtime" /home/linux/Developer/skipi-plugins/_host-runtime

      - name: Resolve guard base
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              BASE="$BEFORE"
            else
              BASE="origin/main"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run skipi-guard
        env:
          SKIPI_GUARD_HOME: crewing
          SKIPI_GUARD_TASK: plugin-host
          BASE: ${{ steps.refs.outputs.base }}
          PR_LABELS_JSON: ${{ toJson(github.event.pull_request.labels) }}
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          OVERRIDE_ARGS=()
          mapfile -t GUARD_CHANGED_FILES < <(
            git diff --name-only --diff-filter=ACDMRTUXB "$BASE...$GITHUB_SHA" 2>/dev/null ||
            git diff --name-only --diff-filter=ACDMRTUXB "$BASE..$GITHUB_SHA"
          )
          GUARD_CHANGED_FILES_PATH="$(mktemp)"
          printf '%s\n' "${GUARD_CHANGED_FILES[@]}" > "$GUARD_CHANGED_FILES_PATH"
          export GUARD_CHANGED_FILES_PATH
          GUARD_TASK="$SKIPI_GUARD_TASK"
          if node <<'NODE'
          const fs = require('fs');

          function cleanPath(value) {
            const normalized = String(value || '').replace(/\\/g, '/');
            return normalized.startsWith('./') ? normalized.slice(2) : normalized;
          }

          function globToRegExp(pattern) {
            let out = '^';
            for (let i = 0; i < pattern.length; i += 1) {
              const char = pattern[i];
              const next = pattern[i + 1];
              if (char === '*' && next === '*') {
                out += '.*';
                i += 1;
              } else if (char === '*') {
                out += '[^/]*';
              } else if (char === '?') {
                out += '[^/]';
              } else {
                out += char.replace(/[\\^$+?.()|[\]{}]/g, '\\$&');
              }
            }
            return new RegExp(out + '$');
          }

          function patternMatches(filePath, pattern) {
            const path = cleanPath(filePath);
            const pat = cleanPath(pattern);
            if (!pat) return false;
            if (pat.endsWith('/**')) {
              const prefix = pat.slice(0, -3);
              return path === prefix || path.startsWith(prefix + '/');
            }
            if (globToRegExp(pat).test(path)) return true;
            if (pat.startsWith('**/') && globToRegExp(pat.slice(3)).test(path)) return true;
            const hasGlob = /[*?[]/.test(pat);
            if (!hasGlob && !pat.includes('/')) {
              return path === pat || path.endsWith('/' + pat) || path.startsWith(pat + '/');
            }
            return false;
          }

          const config = JSON.parse(fs.readFileSync('.skipi-guard/configs/homes/crewing.json', 'utf8'));
          const files = fs.readFileSync(process.env.GUARD_CHANGED_FILES_PATH, 'utf8')
            .split(/\r?\n/)
            .filter(Boolean);
          const releaseSensitive = files.some((file) => (config.release_sensitive_paths || []).some((rule) =>
            (rule.patterns || []).some((pattern) => patternMatches(file, pattern))
          ));

          console.log(`changed_files=${files.length} release_sensitive=${releaseSensitive ? 'yes' : 'no'}`);
          process.exit(releaseSensitive ? 0 : 1);
          NODE
          then
            GUARD_TASK="release"
          else
            for changed_file in "${GUARD_CHANGED_FILES[@]}"; do
              case "$changed_file" in
                tests/build_provenance_harness.mjs|src-tauri/build.rs|src-tauri/src/lib.rs)
                  GUARD_TASK="provenance"
                  ;;
              esac
            done
          fi
          if [[ "${#GUARD_CHANGED_FILES[@]}" -eq 1 && "${GUARD_CHANGED_FILES[0]}" == ".github/workflows/skipi-guard.yml" ]]; then
            GUARD_WORKFLOW_BASE="$(mktemp)"
            GUARD_WORKFLOW_HEAD="$(mktemp)"
            git show "$BASE:.github/workflows/skipi-guard.yml" > "$GUARD_WORKFLOW_BASE"
            cp .github/workflows/skipi-guard.yml "$GUARD_WORKFLOW_HEAD"
            extract_guard_ref() {
              python3 - "$1" <<'PY'
          import sys
          from pathlib import Path

          lines = Path(sys.argv[1]).read_text(encoding="utf-8").splitlines()
          for index, line in enumerate(lines):
              if "repository: CaptTymur/skipi-guard" not in line:
                  continue
              for candidate in lines[index + 1:index + 12]:
                  stripped = candidate.strip()
                  if stripped.startswith("ref:"):
                      print(stripped.split(":", 1)[1].strip().strip("'\""))
                      raise SystemExit(0)
              break
          raise SystemExit(1)
          PY
            }
            OLD_GUARD_REF="$(extract_guard_ref "$GUARD_WORKFLOW_BASE")"
            NEW_GUARD_REF="$(extract_guard_ref "$GUARD_WORKFLOW_HEAD")"
            if [[ -z "$OLD_GUARD_REF" || -z "$NEW_GUARD_REF" ]]; then
              echo "Unable to resolve skipi-guard ref from workflow diff" >&2
              exit 1
            fi
            echo "workflow guard pin old=$OLD_GUARD_REF new=$NEW_GUARD_REF"
            .skipi-guard/bin/skipi-guard assert-config-superset \
              --home "$SKIPI_GUARD_HOME" \
              --old-ref "$OLD_GUARD_REF" \
              --new-ref "$NEW_GUARD_REF" \
              --repo "$GITHUB_WORKSPACE/.skipi-guard" \
              --json /tmp/skipi-guard-config-superset.json
            OVERRIDE_ARGS=(--override-protected skipi-guard-workflow-bootstrap)
          fi
          # One-shot presence-contract bootstrap: the protected manifest may be
          # INTRODUCED (diff-filter=A) together with its harness and this
          # workflow pin, and nothing else. Once presence-manifest.json exists
          # on main, edits to it are M-not-A and never get this override.
          presence_bootstrap_candidate=1
          presence_manifest_added=0
          mapfile -t GUARD_ADDED_FILES < <(
            git diff --name-only --diff-filter=A "$BASE...$GITHUB_SHA" 2>/dev/null ||
            git diff --name-only --diff-filter=A "$BASE..$GITHUB_SHA"
          )
          for added_file in "${GUARD_ADDED_FILES[@]}"; do
            if [[ "$added_file" == "presence-manifest.json" ]]; then
              presence_manifest_added=1
            fi
          done
          for changed_file in "${GUARD_CHANGED_FILES[@]}"; do
            case "$changed_file" in
              presence-manifest.json|tests/crewing_presence_contract_harness.mjs|.github/workflows/skipi-guard.yml) ;;
              *) presence_bootstrap_candidate=0 ;;
            esac
          done
          if [[ "$presence_manifest_added" -eq 1 && "$presence_bootstrap_candidate" -eq 1 ]]; then
            OVERRIDE_ARGS=(--override-protected crewing-presence-contracts-bootstrap)
          fi
          presence_modification_approved=0
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            for changed_file in "${GUARD_CHANGED_FILES[@]}"; do
              if [[ "$changed_file" == "presence-manifest.json" ]]; then
                if node -e 'const labels = JSON.parse(process.env.PR_LABELS_JSON || "[]") || []; const approved = Array.isArray(labels) && labels.some((label) => label && label.name === "presence-change-approved"); process.exit(approved ? 0 : 1);'
                then
                  presence_modification_approved=1
                fi
                break
              fi
            done
          fi
          if [[ "$presence_modification_approved" -eq 1 ]]; then
            GUARD_TASK="release"
            OVERRIDE_ARGS=(--override-protected crewing-presence-modification-approved)
          fi
          presence_main_merge_replay=0
          if [[ "${{ github.event_name }}" == "push" && "${GITHUB_REF:-}" == "refs/heads/main" ]]; then
            for changed_file in "${GUARD_CHANGED_FILES[@]}"; do
              if [[ "$changed_file" == "presence-manifest.json" && "$HEAD_COMMIT_MESSAGE" == Merge\ pull\ request\ \#* ]]; then
                presence_main_merge_replay=1
                break
              fi
            done
          fi
          if [[ "$presence_main_merge_replay" -eq 1 ]]; then
            GUARD_TASK="release"
            OVERRIDE_ARGS=(--override-protected crewing-presence-main-merge-replay)
          fi
          echo "resolved SKIPI_GUARD_TASK=$GUARD_TASK"
          .skipi-guard/bin/skipi-guard verify \
            --home "$SKIPI_GUARD_HOME" \
            --task "$GUARD_TASK" \
            "${OVERRIDE_ARGS[@]}" \
            --run-harness \
            --repo "$GITHUB_WORKSPACE" \
            --base "$BASE" \
            --head "$GITHUB_SHA" \
            --json /tmp/skipi-guard.json

      - name: Upload guard JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skipi-guard-json
          path: /tmp/skipi-guard.json
