name: skipi-guard

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guard:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout app repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout skipi-guard
        uses: actions/checkout@v4
        with:
          repository: CaptTymur/skipi-guard
          ref: d3402d3911cdacbd40a416bf2759575dced6e615
          path: .skipi-guard

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Checkout skipi-host-runtime
        uses: actions/checkout@v4
        with:
          repository: CaptTymur/skipi-host-runtime
          ref: d6238191c554bc370983366672c41b41116754ce
          path: .skipi-host-runtime

      - name: Prepare host runtime for guard harness
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/../skipi-plugins"
          ln -sfn "$GITHUB_WORKSPACE/.skipi-host-runtime" "$GITHUB_WORKSPACE/../skipi-plugins/_host-runtime"
          sudo mkdir -p /home/linux/Developer/skipi-plugins
          sudo ln -sfn "$GITHUB_WORKSPACE/.skipi-host-runtime" /home/linux/Developer/skipi-plugins/_host-runtime

      - name: Resolve guard base
        id: refs
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE="origin/${GITHUB_BASE_REF}"
          else
            BEFORE="${{ github.event.before }}"
            if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
              BASE="$BEFORE"
            else
              BASE="origin/main"
            fi
          fi
          echo "base=$BASE" >> "$GITHUB_OUTPUT"

      - name: Run skipi-guard
        env:
          SKIPI_GUARD_HOME: crewing
          SKIPI_GUARD_TASK: plugin-host
          BASE: ${{ steps.refs.outputs.base }}
        run: |
          set -euo pipefail
          OVERRIDE_ARGS=()
          mapfile -t GUARD_CHANGED_FILES < <(
            git diff --name-only --diff-filter=ACDMRTUXB "$BASE...$GITHUB_SHA" 2>/dev/null ||
            git diff --name-only --diff-filter=ACDMRTUXB "$BASE..$GITHUB_SHA"
          )
          if [[ "${#GUARD_CHANGED_FILES[@]}" -eq 1 && "${GUARD_CHANGED_FILES[0]}" == ".github/workflows/skipi-guard.yml" ]]; then
            OVERRIDE_ARGS=(--override-protected skipi-guard-workflow-bootstrap)
          fi
          .skipi-guard/bin/skipi-guard verify \
            --home "$SKIPI_GUARD_HOME" \
            --task "$SKIPI_GUARD_TASK" \
            "${OVERRIDE_ARGS[@]}" \
            --run-harness \
            --repo "$GITHUB_WORKSPACE" \
            --base "$BASE" \
            --head "$GITHUB_SHA" \
            --json /tmp/skipi-guard.json

      - name: Upload guard JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skipi-guard-json
          path: /tmp/skipi-guard.json
